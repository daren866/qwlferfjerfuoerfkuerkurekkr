name: 强制下载APK + 反编译（无缓存版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 强制清空，不读缓存
      - name: 清理目录
        run: rm -rf cache && mkdir -p cache

      # 下载 123云盘 APK（你给的最新地址）
      - name: 下载APK
        run: |
          curl -L -f --ipv4 \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36' \
            -H 'Referer: https://www.123pan.com/' \
            --connect-timeout 30 \
            --max-time 3600 \
            -o cache/target.apk \
            "https://59-47-225-58.pd1.cjjd19.com/1135-user-other-free-download-cdn.123295.com/123-277/037824a7/1815635943-0/037824a73a646813d0aacc882ca55115/c-m105?v=5&t=1777295279&r=V3GHQR&bzc=1&bzs=313831353633353934333a323a313a333333303536363133&ur=vvmgvgpngvnl&urn=0&s=1777295279d6f29bb9413521580449d5e60f3c2bcd&bzp=0&bi=403044789&filename=bilibili.apk&x-mf-biz-cid=f3b6da60-a44d-4344-8b6c-378a8933fc60-3dab77&auto_redirect=0&ndcp=1&cache_type=1"

      # 显示文件大小，确认下载成功
      - name: 检查文件大小
        run: ls -lh cache/target.apk

      # 反编译
      - name: 安装 JADX 并反编译
        run: |
          wget -q -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip
          chmod +x jadx/bin/jadx
          jadx/bin/jadx --export-gradle -d output cache/target.apk

      # 上传结果
      - name: 上传反编译项目
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-project
          path: output/
