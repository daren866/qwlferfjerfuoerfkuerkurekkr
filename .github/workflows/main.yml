name: APK 逆向（仅提取 JAR）
on:
  workflow_dispatch:
    inputs:
      url:
        description: 粘贴 APK 公开直链
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 下载 APK
        run: wget --max-redirect=10 -O target.apk "${{ github.event.inputs.url }}"

      - name: 安装 dex2jar
        run: |
          wget -O dex-tools.zip https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
          unzip -q dex-tools.zip
          chmod +x dex-tools-v2.4/*.sh

      - name: DEX -> JAR
        run: |
          unzip -q target.apk -d temp
          dex-tools-v2.4/d2j-dex2jar.sh temp/*.dex -o app.jar
          ls -lh app.jar

      - name: 上传 JAR 文件
        uses: actions/upload-artifact@v4
        with:
          name: 反编译JAR
          path: app.jar
