name: APK 一键逆向（apktool + dex2jar 方案）
on:
  workflow_dispatch:
    inputs:
      url:
        description: 粘贴 APK 公开直链
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载 APK
        run: |
          wget --max-redirect=10 -O target.apk "${{ github.event.inputs.url }}"
          ls -lh target.apk

      - name: 2. 验证 APK 完整性
        run: |
          if ! unzip -t target.apk > /dev/null 2>&1; then
            echo "❌ APK 文件无效，请检查 URL"
            exit 1
          fi
          echo "✅ APK 有效"

      - name: 3. 安装工具（apktool + dex2jar + jd-cmd）
        run: |
          # 安装 apktool
          wget -O apktool https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget -O apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/2.9.3/apktool-2.9.3.jar
          chmod +x apktool
          
          # 安装 dex2jar
          wget -O dex-tools.zip https://github.com/pxb1988/dex2jar/releases/download/2.4/dex-tools-2.4.zip
          unzip -q dex-tools.zip -d dex2jar
          chmod +x dex2jar/dex-tools-2.4/*.sh
          
          # 安装 jd-cmd
          wget -O jd-cmd.jar https://github.com/kwart/jd-cmd/releases/download/0.9.2/jd-cli-0.9.2-dist.jar
          
          echo "工具安装完成"

      - name: 4. 提取资源和 dex 文件
        run: |
          # 使用 apktool 解码资源
          ./apktool d target.apk -o apk_resources -f
          echo "资源解码完成"
          
          # 直接解压 APK 获取 classes.dex
          unzip -q target.apk -d apk_extracted
          echo "DEX 文件列表："
          ls -lh apk_extracted/*.dex 2>/dev/null || echo "未找到 .dex 文件"

      - name: 5. 转换 DEX 为 JAR
        run: |
          # 将所有 classes*.dex 转换为一个 jar
          cd apk_extracted
          ../dex2jar/dex-tools-2.4/d2j-dex2jar.sh *.dex -o ../decompiled.jar
          cd ..
          echo "JAR 文件大小："
          ls -lh decompiled.jar

      - name: 6. 反编译 JAR 为 Java 源码
        run: |
          # 使用 jd-cmd 将 jar 反编译为 .java 文件
          java -jar jd-cmd.jar decompiled.jar --outputDir java_src
          echo "Java 源码反编译完成"
          
          # 统计源码数量
          echo "Java 文件数量："
          find java_src -name "*.java" | wc -l

      - name: 7. 打包所有产出
        run: |
          # 创建最终产出目录
          mkdir final_output
          
          # 复制源码
          cp -r java_src final_output/
          
          # 复制资源（可选）
          cp -r apk_resources final_output/
          
          # 复制 JAR 文件（备用）
          cp decompiled.jar final_output/
          
          # 生成信息文件（使用 echo 逐行写入）
          echo "APK 逆向产出说明" > final_output/README.txt
          echo "================" >> final_output/README.txt
          echo "" >> final_output/README.txt
          echo "- java_src/: Java 源代码（jd-cmd 反编译）" >> final_output/README.txt
          echo "- apk_resources/: APK 资源文件（apktool 解码）" >> final_output/README.txt
          echo "- decompiled.jar: DEX 转换后的 JAR 文件" >> final_output/README.txt
          echo "" >> final_output/README.txt
          echo "注意：" >> final_output/README.txt
          echo "- 部分代码可能反编译不完全，建议配合 JADX-GUI 查看" >> final_output/README.txt
          echo "- 资源文件包含 AndroidManifest.xml、布局文件等" >> final_output/README.txt

      - name: 8. 上传所有产出
        uses: actions/upload-artifact@v4
        with:
          name: APK逆向完整产出
          path: final_output/
          compression-level: 0
