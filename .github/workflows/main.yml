name: 上传产物到 Releases
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 使用 gh CLI 下载并上传
        run: |
          # 配置 git
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 下载产物（gh CLI 自动处理认证）
          gh run download 24675353299 --name "Java源码"
          
          # 上传到 Release
          TAG="${{ github.event.inputs.tag_name }}"
          gh release upload "$TAG" "Java源码.zip" --clobber || \
          gh release create "$TAG" "Java源码.zip" --title "$TAG" --notes "自动上传"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
