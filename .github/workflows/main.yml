name: APK 一键逆向（最终稳定版）
on:
  workflow_dispatch:
    inputs:
      url:
        description: 粘贴 APK 公开直链（transfer.sh）
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载 APK
        run: |
          wget -O target.apk "${{ github.event.inputs.url }}"
          ls -lh target.apk

      - name: 2. 下载并准备 JADX
        run: |
          wget -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip -d jadx_tool
          # 查找真实的 jadx 可执行文件
          JADX_BIN=$(find jadx_tool -name "jadx" -type f -executable | head -n 1)
          if [ -z "$JADX_BIN" ]; then
            echo "未找到 jadx 可执行文件，请检查下载和解压过程"
            exit 1
          fi
          echo "找到 jadx 路径: $JADX_BIN"
          echo "JADX_BIN=$JADX_BIN" >> $GITHUB_ENV

      - name: 3. 开始逆向！（核心命令）
        run: |
          chmod +x $JADX_BIN
          $JADX_BIN --export-gradle -d out target.apk

      - name: 4. 上传逆向完成的源码
        uses: actions/upload-artifact@v4
        with:
          name: 逆向源码
          path: out/
