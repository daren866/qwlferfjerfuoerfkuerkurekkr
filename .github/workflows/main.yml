name: APK 一键逆向（最终稳定版）
on:
  workflow_dispatch:
    inputs:
      url:
        description: 粘贴 APK 公开直链（transfer.sh）
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载 APK
        run: |
          wget --max-redirect=10 -O target.apk "${{ github.event.inputs.url }}"
          ls -lh target.apk

      - name: 2. 验证 APK 完整性
        run: |
          if ! unzip -t target.apk > /dev/null 2>&1; then
            echo "❌ APK 文件无效，请检查 URL"
            exit 1
          fi
          echo "✅ APK 有效"

      - name: 3. 删除 APK 内损坏的 ZIP 资源
        run: |
          unzip -l target.apk | grep '\.zip$' || echo "未发现 .zip 文件"
          zip -d target.apk 'assets/**/*.zip' 2>/dev/null || echo "无 zip 文件需删除"

      - name: 4. 下载 JADX
        run: |
          wget -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip -d jadx_tool
          JADX_BIN=$(find jadx_tool -name "jadx" -type f -executable | head -n 1)
          echo "JADX_BIN=$JADX_BIN" >> $GITHUB_ENV

      - name: 5. 反编译（通过 JAVA_OPTS 增大内存，跳过资源）
        run: |
          chmod +x $JADX_BIN
          export JAVA_OPTS="-Xmx4g"
          $JADX_BIN --export-gradle -d out --no-res target.apk

      - name: 6. 上传源码
        uses: actions/upload-artifact@v4
        with:
          name: 逆向源码
          path: out/
