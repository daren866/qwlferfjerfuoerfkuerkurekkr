name: APK 一键逆向（最终稳定版）
on:
  workflow_dispatch:
    inputs:
      url:
        description: 粘贴 APK 公开直链（transfer.sh）
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载 APK
        run: |
          wget -O target.apk "${{ github.event.inputs.url }}"
          ls -lh target.apk

      - name: 2. 下载 JADX 反编译工具
        run: |
          wget -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip
          # 重命名成标准名称，防止路径错误
          mv jadx-1.5.3 jadx

      - name: 3. 开始逆向！（核心命令）
        run: |
          chmod +x jadx/bin/jadx
          jadx/bin/jadx --export-gradle -d out target.apk

      - name: 4. 上传逆向完成的源码
        uses: actions/upload-artifact@v4
        with:
          name: 逆向源码
          path: out/
