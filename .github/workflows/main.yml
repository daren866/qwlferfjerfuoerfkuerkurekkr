name: 执行自定义curl · 下载APK · 自动反编译

on:
  workflow_dispatch:
    inputs:
      curl_command:
        description: '粘贴完整的curl下载命令'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 清理目录
        run: rm -rf cache && mkdir -p cache

      - name: 执行你粘贴的curl命令
        run: |
          # 执行你输入的完整curl命令，并强制输出到 cache/target.apk
          ${{ github.event.inputs.curl_command }} -o cache/target.apk

      - name: 查看文件大小
        run: ls -lh cache/target.apk

      - name: 反编译APK
        run: |
          wget -q -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip
          chmod +x jadx/bin/jadx
          jadx/bin/jadx --export-gradle -d output cache/target.apk

      - name: 上传反编译结果
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-project
          path: output/
