name: APK 一键逆向（最终稳定版）
on:
  workflow_dispatch:
    inputs:
      url:
        description: 粘贴 APK 公开直链（transfer.sh）
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载 APK（支持重定向）
        run: |
          wget --max-redirect=10 -O target.apk "${{ github.event.inputs.url }}"
          echo "下载完成，文件大小："
          ls -lh target.apk

      - name: 2. 验证 APK 文件完整性
        run: |
          if ! unzip -t target.apk > /dev/null 2>&1; then
            echo "❌ 错误：下载的文件不是有效的 APK/ZIP 文件"
            echo "可能原因："
            echo "  1. URL 不是直接下载链接（例如是网页链接）"
            echo "  2. 文件下载不完整"
            echo "  3. 文件已损坏"
            exit 1
          fi
          echo "✅ APK 文件完整性验证通过"

      - name: 3. 下载并准备 JADX
        run: |
          wget -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip -d jadx_tool
          JADX_BIN=$(find jadx_tool -name "jadx" -type f -executable | head -n 1)
          if [ -z "$JADX_BIN" ]; then
            echo "未找到 jadx 可执行文件"
            exit 1
          fi
          echo "JADX_BIN=$JADX_BIN" >> $GITHUB_ENV

      - name: 4. 开始逆向（跳过资源解码，避免 assets 中损坏的 zip 文件干扰）
        run: |
          chmod +x $JADX_BIN
          $JADX_BIN --export-gradle -d out --no-res target.apk

      - name: 5. 上传逆向完成的源码
        uses: actions/upload-artifact@v4
        with:
          name: 逆向源码
          path: out/
