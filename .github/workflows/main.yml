name: APK 逆向（轻量版）

on:
  workflow_dispatch:
    inputs:
      url:
        description: '粘贴 APK 公开直链'
        required: true
        type: string
      tag_name:
        description: 'Release 标签名（可选）'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 下载 APK
        run: wget --max-redirect=10 -O target.apk "${{ github.event.inputs.url }}"

      - name: 安装 dex2jar
        run: |
          wget -O dex-tools.zip https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
          unzip -q dex-tools.zip
          chmod +x dex-tools-v2.4/*.sh

      - name: 提取 DEX 文件
        run: |
          unzip -q target.apk -d temp
          echo "DEX 文件列表："
          ls -la temp/*.dex

      - name: 转换 DEX 为 JAR
        run: |
          cd temp
          for dex in *.dex; do
            echo "转换: $dex"
            ../dex-tools-v2.4/d2j-dex2jar.sh "$dex"
          done
          
          mkdir -p merged_classes
          for jar in *-dex2jar.jar; do
            echo "解压: $jar"
            unzip -q "$jar" -d merged_classes
          done
          
          cd merged_classes
          jar cf ../app.jar .
          cd ../..
          
          echo "合并后的 JAR 大小："
          ls -lh temp/app.jar
          cp temp/app.jar .

      - name: 打包 JAR 文件
        run: |
          mkdir -p java_src
          cp app.jar java_src/
          cd java_src
          zip -r ../Java源码.zip .
          cd ..
          ls -lh Java源码.zip

      - name: 配置 git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 上传到 Release
        run: |
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="apk-reverse-$(date +'%Y%m%d-%H%M%S')"
          fi
          
          echo "使用 Release 标签: $TAG"
          
          gh release upload "$TAG" Java源码.zip --clobber --repo "${{ github.repository }}" || \
          gh release create "$TAG" Java源码.zip --title "$TAG" --notes "APK 逆向产物自动上传" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传产物备份
        uses: actions/upload-artifact@v4
        with:
          name: Java源码
          path: java_src/
