name: APK 逆向（轻量版）
on:
  workflow_dispatch:
    inputs:
      url:
        description: 粘贴 APK 公开直链
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 下载 APK
        run: wget --max-redirect=10 -O target.apk "${{ github.event.inputs.url }}"

      - name: 安装 dex2jar 和 jd-cmd
        run: |
          wget -O dex-tools.zip https://github.com/pxb1988/dex2jar/releases/download/2.4/dex-tools-2.4.zip
          unzip -q dex-tools.zip
          wget -O jd-cmd.jar https://github.com/kwart/jd-cmd/releases/download/0.9.2/jd-cli-0.9.2-dist.jar

      - name: DEX -> JAR -> Java
        run: |
          unzip -q target.apk -d temp
          dex2jar-2.4/d2j-dex2jar.sh temp/*.dex -o app.jar
          java -jar jd-cmd.jar app.jar --outputDir java_src

      - name: 上传源码
        uses: actions/upload-artifact@v4
        with:
          name: Java源码
          path: java_src/
