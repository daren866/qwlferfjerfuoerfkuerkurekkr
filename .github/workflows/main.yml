name: 下载123云盘APK + 缓存 + 反编译

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: '粘贴123云盘下载直链'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置缓存
        uses: actions/cache@v4
        with:
          path: ./cache
          key: androidapks

      - name: 下载APK（修复版）
        run: |
          mkdir -p cache
          curl -L -f --ipv4 \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36' \
            -H 'Referer: https://www.123pan.com/' \
            -H 'Accept: */*' \
            --connect-timeout 30 \
            --max-time 3600 \
            -o 'cache/target.apk' \
            "${{ github.event.inputs.apk_url }}"
          
          # 检查文件大小，防止下载失败
          ls -lh cache/target.apk

      - name: 安装 JADX
        run: |
          wget -q -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: 反编译APK
        run: |
          jadx/bin/jadx --export-gradle -d output cache/target.apk

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: decompiled
          path: output/
