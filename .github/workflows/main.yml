name: 下载APK并反编译
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 下载APK
        run: |
          mkdir -p cache
          wget --no-check-certificate -O cache/target.apk "https://download-sc1.huang1111.cn/api/v3/slave/download/0/bmV3Mi9iYXNpYy8xNDkyMTYvMjAyNi8wNDIwLzIxMjgvYmlsaWJpbGkuYXBr/bilibili.apk?sign=65T9ZTfwzfKQyFr6yw7r9X_SO5NpcC-ArPzWK4say3M%3D%3A1776692415"
          ls -lh cache/target.apk

      - name: 反编译
        run: |
          wget -O jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.3/jadx-1.5.3.zip
          unzip -q jadx.zip
          chmod +x jadx/bin/jadx
          jadx/bin/jadx --export-gradle -d output cache/target.apk

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: decompiled
          path: output/
