name: 上传产物到 Releases
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: 使用产物 ID 直接下载
        run: |
          ARTIFACT_ID="6535664207"
          
          echo "下载产物 ID: $ARTIFACT_ID"
          
          # 直接通过 artifact ID 下载
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -o code.zip \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip"
          
          ls -lh code.zip
          
          # 检查是否下载成功
          if file code.zip | grep -q "Zip archive"; then
            echo "✅ 下载成功"
          else
            echo "❌ 下载失败，内容："
            cat code.zip
            exit 1
          fi

      - name: 上传到 Release
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          
          # 创建 Release（如果不存在）
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"从 Actions 产物自动上传\",\"draft\":false,\"prerelease\":false}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            2>/dev/null || echo "Release may already exist"
          
          # 获取 upload_url
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          
          UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url":"[^"]*"' | cut -d'"' -f4 | sed 's/{?name,label}//')
          
          echo "Upload URL: $UPLOAD_URL"
          
          # 上传文件
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary "@code.zip" \
            "$UPLOAD_URL?name=code.zip"
          
          echo "✅ 上传完成"
