name: 上传产物到 Releases
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'
      run_id:
        description: 'Actions Run ID'
        required: true
        default: '24675353299'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: 检出仓库（解决 git 上下文问题）
        uses: actions/checkout@v4

      - name: 安装 gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list
          sudo apt update
          sudo apt install gh -y

      - name: 下载 Java源码 产物
        run: |
          # 切换到仓库目录
          cd $GITHUB_WORKSPACE
          gh run download ${{ github.event.inputs.run_id }} --name "Java源码" --repo "${{ github.repository }}"
          ls -lh "Java源码.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传到 Release
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          cd $GITHUB_WORKSPACE
          
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release $TAG 已存在，上传文件..."
            gh release upload "$TAG" "Java源码.zip" --clobber --repo "${{ github.repository }}"
          else
            echo "创建新 Release: $TAG"
            gh release create "$TAG" "Java源码.zip" --title "$TAG" --notes "从 Actions 产物自动上传" --repo "${{ github.repository }}"
          fi
          
          echo "✅ 上传完成"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
