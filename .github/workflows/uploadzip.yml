name: 上传产物到 Releases
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'
      run_id:
        description: 'Actions Run ID'
        required: true
        default: '24675353299'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: 安装 gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list
          sudo apt update
          sudo apt install gh -y

      - name: 下载并上传
        run: |
          # 下载 Java源码 产物
          gh run download ${{ github.event.inputs.run_id }} --name "Java源码"
          
          # 上传到 Release
          gh release upload ${{ github.event.inputs.tag_name }} "Java源码.zip" --clobber \
            --repo "${{ github.repository }}" || \
          gh release create ${{ github.event.inputs.tag_name }} "Java源码.zip" \
            --title "${{ github.event.inputs.tag_name }}" \
            --notes "从 Actions 产物自动上传"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
