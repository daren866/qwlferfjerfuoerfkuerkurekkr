name: 上传产物到 Releases (curl版)
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'
      artifact_url:
        description: '产物链接'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载产物
        run: |
          ARTIFACT_ID=$(echo "${{ github.event.inputs.artifact_url }}" | sed 's/.*\/artifacts\///')
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o code.zip \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip"
          ls -lh code.zip

      - name: 创建 Release
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${{ github.event.inputs.tag_name }}\",\"name\":\"${{ github.event.inputs.tag_name }}\",\"body\":\"从 Actions 产物自动上传\",\"draft\":false,\"prerelease\":false}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            2>/dev/null || echo "Release may already exist"

      - name: 上传文件到 Release
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          
          # 获取 upload_url
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          
          UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url":"[^"]*"' | cut -d'"' -f4 | sed 's/{?name,label}//')
          
          # 上传文件
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary "@code.zip" \
            "$UPLOAD_URL?name=code.zip"
          
          echo "✅ 上传完成"
