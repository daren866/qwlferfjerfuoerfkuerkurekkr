name: 上传产物到 Releases
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 下载同工作流的产物
        uses: actions/download-artifact@v4
        with:
          name: Java源码
          path: downloaded_artifact

      - name: 打包下载的产物
        run: |
          # 将下载的文件夹打包成 zip
          cd downloaded_artifact
          zip -r ../code.zip .
          cd ..
          ls -lh code.zip

      - name: 上传到 Release
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          
          # 配置 git
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 创建并上传 Release
          gh release upload "$TAG" code.zip --clobber --repo "${{ github.repository }}" || \
          gh release create "$TAG" code.zip --title "$TAG" --notes "自动上传" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
