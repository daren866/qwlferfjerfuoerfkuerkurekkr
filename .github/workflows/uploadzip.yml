name: 上传产物到 Releases
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 使用 PAT 下载产物
        run: |
          gh run download 24675353299 --name "Java源码" --repo "${{ github.repository }}"
          ls -lh "Java源码.zip"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}  # 从 Secrets 读取

      - name: 上传到 Release
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          gh release upload "$TAG" "Java源码.zip" --clobber --repo "${{ github.repository }}" || \
          gh release create "$TAG" "Java源码.zip" --title "$TAG" --notes "自动上传" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
