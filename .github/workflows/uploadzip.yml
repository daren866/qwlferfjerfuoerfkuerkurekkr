name: 上传产物到 Releases（gh CLI版）
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release 标签名'
        required: true
        default: 'latest'
      artifact_url:
        description: '产物链接'
        required: true
        default: 'https://github.com/daren866/play-coder/actions/runs/24675353299/artifacts/653566420'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 安装 gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list
          sudo apt update
          sudo apt install gh -y

      - name: 下载产物
        run: |
          ARTIFACT_ID=$(echo "${{ github.event.inputs.artifact_url }}" | grep -oP '/artifacts/\K\d+')
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" --output code.zip
          ls -lh code.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传到 Release
        run: |
          if gh release view "${{ github.event.inputs.tag_name }}" > /dev/null 2>&1; then
            echo "Release 已存在，上传文件..."
            gh release upload "${{ github.event.inputs.tag_name }}" code.zip --clobber
          else
            echo "创建新 Release..."
            gh release create "${{ github.event.inputs.tag_name }}" code.zip \
              --title "${{ github.event.inputs.tag_name }}" \
              --notes "从 Actions 产物自动上传"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
